services:

  # ─── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${META_DB_NAME:-ppdm_meta}
      POSTGRES_USER:     ${META_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${META_DB_PASS:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${META_DB_USER:-postgres} -d ${META_DB_NAME:-ppdm_meta}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Express API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: ./server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      # Override host to use the db container — jangan diubah
      META_DB_HOST: db
    ports:
      - "${API_PORT:-3001}:3001"

  # ─── Nginx + React ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  pgdata:
